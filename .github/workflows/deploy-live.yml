name: deploy-live

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

env:
  VAULT_ADDR: http://vault:8200
  VAULT_READ_TOKEN: ${{ secrets.VAULT_READ_TOKEN }}
  SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

jobs:
  build:
    runs-on: [self-hosted, live, 1imooo]
    steps:
      - uses: actions/checkout@v4
      - run: bash ./release/steps/build.sh live

  unit-test:
    needs: build
    runs-on: [self-hosted, live, 1imooo]
    steps:
      - uses: actions/checkout@v4
      - run: bash ./release/steps/unit-test.sh live

  trivy:
    needs: unit-test
    runs-on: [self-hosted, live, 1imooo]
    steps:
      - uses: actions/checkout@v4
      - run: bash ./release/steps/trivy.sh live

  sonar:
    needs: trivy
    runs-on: [self-hosted, live, 1imooo]
    steps:
      - uses: actions/checkout@v4
      - run: bash ./release/steps/sonar.sh live

  push:
    needs: sonar
    runs-on: [self-hosted, live, 1imooo]
    steps:
      - uses: actions/checkout@v4
      - run: bash ./release/steps/push.sh live

  deploy:
    needs: push
    runs-on: [self-hosted, live, 1imooo]
    steps:
      - uses: actions/checkout@v4
      - run: bash ./release/steps/deploy.sh live
